<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dynamic Price Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 48px 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
        }

        .header {
            text-align: center;
            margin-bottom: 36px;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
        }

        h1 {
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-top: 6px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        input[type="number"], select {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            outline: none;
            appearance: none;
            -webkit-appearance: none;
        }

        input[type="number"]:focus, select:focus {
            border-color: rgba(130, 100, 255, 0.7);
            background: rgba(130, 100, 255, 0.12);
            box-shadow: 0 0 0 3px rgba(130, 100, 255, 0.15);
        }

        input[type="number"]::placeholder {
            color: rgba(255,255,255,0.3);
        }

        select option {
            background: #302b63;
            color: #fff;
        }

        .hint {
            font-size: 11px;
            color: rgba(255,255,255,0.35);
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #7c3aed, #a855f7);
            border: none;
            border-radius: 12px;
            color: #fff;
            font-size: 16px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            letter-spacing: 0.3px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.5);
        }

        .btn:active {
            transform: translateY(0);
        }

        .result-box {
            margin-top: 28px;
            padding: 20px 24px;
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.25), rgba(168, 85, 247, 0.15));
            border: 1px solid rgba(168, 85, 247, 0.4);
            border-radius: 14px;
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        .result-label {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .result-value {
            font-size: 36px;
            font-weight: 700;
            color: #c084fc;
            letter-spacing: -1px;
        }

        .result-unit {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-top: 4px;
        }

        .error-box {
            margin-top: 20px;
            padding: 14px 18px;
            background: rgba(239, 68, 68, 0.15);
            border: 1px solid rgba(239, 68, 68, 0.4);
            border-radius: 12px;
            color: #fca5a5;
            font-size: 14px;
            text-align: center;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .divider {
            height: 1px;
            background: rgba(255,255,255,0.08);
            margin: 28px 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <span class="icon">📈</span>
            <h1>Dynamic Price Predictor</h1>
            <p class="subtitle">AI-powered pricing based on market conditions</p>
        </div>

        <form action="/predict" method="post" id="predictForm">
            <div class="form-group">
                <label for="demand">Demand Level</label>
                <input type="number" id="demand" name="demand" min="1" max="3" step="1" placeholder="Enter 1 (Low), 2 (Medium), or 3 (High)" required>
                <p class="hint">1 = Low &nbsp;|&nbsp; 2 = Medium &nbsp;|&nbsp; 3 = High</p>
            </div>

            <div class="form-group">
                <label for="competitor">Competitor Price (₹)</label>
                <input type="number" id="competitor" name="competitor" min="0" step="0.01" placeholder="e.g. 850" required>
                <p class="hint">Enter the current competitor's price in rupees</p>
            </div>

            <div class="form-group">
                <label for="season">Season</label>
                <select id="season" name="season" required>
                    <option value="" disabled selected>-- Select Season --</option>
                    <option value="0">🌤️ Off-Season</option>
                    <option value="1">🔥 Peak Season</option>
                </select>
            </div>

            <button type="submit" class="btn" id="predictBtn">⚡ Predict Price</button>
        </form>

        {% if error %}
        <div class="error-box">
            ⚠️ {{ error }}
        </div>
        {% endif %}

        {% if result %}
        <div class="divider"></div>
        <div class="result-box">
            <p class="result-label">Predicted Price</p>
            <p class="result-value">₹{{ result }}</p>
            <p class="result-unit">Recommended market price</p>
        </div>
        {% endif %}
    </div>

    <script>
        document.getElementById('predictForm').addEventListener('submit', function() {
            const btn = document.getElementById('predictBtn');
            btn.textContent = '⏳ Predicting...';
            btn.disabled = true;
            setTimeout(() => {
                btn.textContent = '⚡ Predict Price';
                btn.disabled = false;
            }, 3000);
        });
    </script>
</body>
</html>
